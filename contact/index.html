<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@300;400;500&display=swap">
    <link rel="stylesheet" href="../style.css">
    <script src="../global.js" type="module"></script>
    <title>Contact Me</title>
</head>
<body>

    <h1>Contact Me</h1>
    <form action="mailto:tvidyala@ucsd.edu" method="get">
        <label class="field">
            <span class="field__label">Subject</span>
            <input class="field__input" name="subject">
        </label>
        <label class="field">
            <span class="field__label">Message</span>
            <textarea class="field__input" name="body" rows="5"></textarea>
        </label>
        <button class="btn btn--primary">send the note <span class="arrow">→</span></button>
    </form>
</body>
</html>
